name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # required to create a GitHub Release
  id-token: write  # required for npm provenance attestation

jobs:
  release:
    name: Build, publish, and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          # Configures the npm registry so NODE_AUTH_TOKEN is picked up automatically.
          registry-url: "https://registry.npmjs.org"

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-ubuntu-latest-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-ubuntu-latest-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build all packages (tsup)
        run: pnpm build

      - name: Publish @uplnk/app to npm
        working-directory: packages/app
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate changelog from commits
        id: changelog
        shell: bash
        run: |
          # Derive the previous tag to bound the commit range.
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          CURRENT_TAG="${GITHUB_REF_NAME}"

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          else
            RANGE="${CURRENT_TAG}"
          fi

          echo "Generating changelog for range: ${RANGE}"

          # Build a conventional-style log: sha (short) + subject.
          LOG=$(git log "${RANGE}" --pretty=format:"- %h %s" --no-merges)

          # Write to $GITHUB_OUTPUT using the multiline delimiter pattern.
          {
            echo "content<<CHANGELOG_EOF"
            echo "${LOG}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const changelog = `${{ steps.changelog.outputs.content }}`;

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: `## What's Changed\n\n${changelog}\n\n**Full Changelog:** https://github.com/${context.repo.owner}/${context.repo.repo}/commits/${tag}`,
              draft: false,
              prerelease: tag.includes('-'),
            });
