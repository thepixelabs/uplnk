name: Release

# Trigger on every push to main. semantic-release decides whether a new
# version is warranted by analysing conventional commits since the last tag.
# If there are no releasable commits it exits 0 without publishing anything.
on:
  push:
    branches:
      - main

# Prevent two release jobs from running simultaneously. Unlike CI, we never
# cancel an in-flight release — a partial release that gets killed midway
# leaves the repo in an inconsistent state (tag written, npm not published).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest

    permissions:
      contents: write       # push version-bump commit + create GitHub Release
      issues: write         # allow @semantic-release/github to comment on issues
      pull-requests: write  # allow @semantic-release/github to comment on PRs
      id-token: write       # required for npm OIDC trusted publishing (provenance)

    steps:
      - name: Checkout (full history — semantic-release needs all tags and commits)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # RELEASE_TOKEN must be a fine-grained PAT (or classic PAT with repo scope)
          # belonging to a repo admin. With enforce_admins=false on the branch
          # protection rule, an admin's PAT can push the version-bump commit directly
          # to main without opening a PR. Falls back to GITHUB_TOKEN if unset
          # (which will fail when branch protection is enforced).
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          # registry-url writes the .npmrc that points npm at the registry and
          # enables OIDC token exchange. Required for the provenance publish step
          # below. Do NOT set NODE_AUTH_TOKEN — it would override the OIDC flow.
          registry-url: "https://registry.npmjs.org"

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-ubuntu-latest-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-ubuntu-latest-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run the same checks CI runs on PRs so we never publish a broken build.
      - name: Typecheck (all packages)
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build all packages
        run: pnpm build

      - name: Verify shebang in bin output
        run: |
          head -1 packages/app/dist/uplnk.js | grep -q '#!/usr/bin/env node' \
            || (echo "ERROR: shebang missing from dist/uplnk.js" && exit 1)

      - name: Verify build output exists
        run: |
          test -f packages/app/dist/uplnk.js || (echo "ERROR: dist/uplnk.js not found" && exit 1)
          test -f packages/app/dist/index.js || (echo "ERROR: dist/index.js not found" && exit 1)
          echo "Build outputs verified"

      # semantic-release reads release.config.cjs from the repo root.
      # It will:
      #   1. Analyse commits since the last tag.
      #   2. If releasable: bump packages/app/package.json, write CHANGELOG.md,
      #      commit both back to main, create a GitHub Release tagged vX.Y.Z.
      #      (npm publish is intentionally disabled inside semantic-release — see
      #       release.config.cjs for the rationale; publishing happens below.)
      #   3. If nothing to release: exit 0 silently.
      # The SR_RELEASED output is set to "true" when a release was actually cut
      # so the publish step below can be conditioned on it.
      - name: Run semantic-release
        id: sr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          pnpm exec semantic-release
          # semantic-release exits 0 regardless of whether it released.
          # Check whether a tag matching the current packages/app version exists.
          VERSION=$(node -p "require('./packages/app/package.json').version")
          if git tag --list "v${VERSION}" | grep -q .; then
            echo "released=true"  >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      # Publish to npm with OIDC provenance. This runs only when semantic-release
      # cut a new release. We use pnpm publish (not npm publish) so pnpm handles
      # the workspace context correctly, but the underlying npm OIDC exchange is
      # triggered by the id-token: write permission + registry-url in setup-node.
      #
      # --provenance:   attach SLSA build provenance attestation to the package.
      # --access public: belt-and-suspenders; publishConfig.access in package.json
      #                  already declares this, but explicit is safer.
      # --no-git-checks: semantic-release has already committed and tagged; the
      #                  working tree may be clean but pnpm's git checks would
      #                  flag the detached state on the tag commit.
      - name: Publish to npm (OIDC + provenance)
        if: steps.sr.outputs.released == 'true'
        run: pnpm --filter uplnk publish --provenance --access public --no-git-checks
