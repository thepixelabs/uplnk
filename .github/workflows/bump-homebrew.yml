name: Bump Homebrew Formula

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to bump (e.g. v1.2.3)"
        required: true
        type: string

jobs:
  bump:
    # Only run for stable releases (no pre-release suffix).
    # For workflow_dispatch the caller is expected to supply a stable tag,
    # but we guard here as well.
    if: "!contains(github.event.release.tag_name || inputs.tag, '-')"
    runs-on: ubuntu-latest

    steps:
      - name: Resolve version
        id: vars
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          # Scoped to the tap repo only — this App has no write access elsewhere.
          repositories: homebrew-tap

      - name: Wait for GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          # Wait for both the binary AND its .sha256 sidecar to appear.
          # The sidecar is uploaded after the binary, so its presence confirms
          # the binary upload has completed (not just started).
          REQUIRED_ASSETS=(
            "uplnk-darwin-arm64"
            "uplnk-darwin-arm64.sha256"
            "uplnk-darwin-x64"
            "uplnk-darwin-x64.sha256"
            "uplnk-linux-x64"
            "uplnk-linux-x64.sha256"
            "uplnk-linux-arm64"
            "uplnk-linux-arm64.sha256"
          )
          # Allow 2 minutes for the binary build runners to start and warm up
          # before beginning the poll loop.
          echo "Waiting 120s for binary build runners to initialise..."
          sleep 120
          echo "Polling for all 8 assets on tag ${TAG}..."
          for i in $(seq 1 20); do
            PRESENT=$(gh release view "${TAG}" \
              --repo thepixelabs/uplnk \
              --json assets \
              --jq '[.assets[].name]' 2>/dev/null || echo "[]")
            ALL_FOUND=true
            for asset in "${REQUIRED_ASSETS[@]}"; do
              if ! echo "${PRESENT}" | grep -q "\"${asset}\""; then
                ALL_FOUND=false
                echo "  attempt ${i}/20 — ${asset} not yet present"
                break
              fi
            done
            if [ "${ALL_FOUND}" = "true" ]; then
              echo "All assets are present on release ${TAG}."
              exit 0
            fi
            sleep 60
          done
          echo "ERROR: Timed out waiting for release binaries on ${TAG}"
          exit 1

      - name: Fetch sha256 checksums from release sidecars
        id: sha
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          BASE_URL="https://github.com/thepixelabs/uplnk/releases/download/v${VERSION}"

          # Download the pre-computed sha256 sidecars generated by build-binaries.yml.
          # This avoids re-downloading each full binary just to compute the hash.
          fetch_sha() {
            local name="$1"
            curl -fsSL "${BASE_URL}/${name}.sha256" | awk '{print $1}' | tr -d '\r'
          }

          SHA_DARWIN_ARM64=$(fetch_sha "uplnk-darwin-arm64")
          SHA_DARWIN_X64=$(fetch_sha   "uplnk-darwin-x64")
          SHA_LINUX_X64=$(fetch_sha    "uplnk-linux-x64")
          SHA_LINUX_ARM64=$(fetch_sha  "uplnk-linux-arm64")

          echo "sha_darwin_arm64=${SHA_DARWIN_ARM64}" >> "$GITHUB_OUTPUT"
          echo "sha_darwin_x64=${SHA_DARWIN_X64}"     >> "$GITHUB_OUTPUT"
          echo "sha_linux_x64=${SHA_LINUX_X64}"       >> "$GITHUB_OUTPUT"
          echo "sha_linux_arm64=${SHA_LINUX_ARM64}"   >> "$GITHUB_OUTPUT"

          echo "url_darwin_arm64=${BASE_URL}/uplnk-darwin-arm64" >> "$GITHUB_OUTPUT"
          echo "url_darwin_x64=${BASE_URL}/uplnk-darwin-x64"     >> "$GITHUB_OUTPUT"
          echo "url_linux_x64=${BASE_URL}/uplnk-linux-x64"       >> "$GITHUB_OUTPUT"
          echo "url_linux_arm64=${BASE_URL}/uplnk-linux-arm64"   >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: thepixelabs/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}

      - name: Write formula
        # Avoid heredocs entirely — bash heredoc terminators in YAML run: | blocks
        # are unreliable because YAML block-scalar indentation stripping and bash's
        # <<~ tab-stripping interact in platform-specific ways. printf per-line is
        # unambiguous: static strings are single-quoted (no expansion), dynamic
        # values use double-quoted %s substitution.
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          URL_DA_ARM64="${{ steps.sha.outputs.url_darwin_arm64 }}"
          SHA_DA_ARM64="${{ steps.sha.outputs.sha_darwin_arm64 }}"
          URL_DA_X64="${{ steps.sha.outputs.url_darwin_x64 }}"
          SHA_DA_X64="${{ steps.sha.outputs.sha_darwin_x64 }}"
          URL_LX_ARM64="${{ steps.sha.outputs.url_linux_arm64 }}"
          SHA_LX_ARM64="${{ steps.sha.outputs.sha_linux_arm64 }}"
          URL_LX_X64="${{ steps.sha.outputs.url_linux_x64 }}"
          SHA_LX_X64="${{ steps.sha.outputs.sha_linux_x64 }}"

          {
            printf '%s\n' 'class Uplnk < Formula'
            printf '%s\n' '  desc "Terminal-native AI chat client — local-first, privacy-first"'
            printf '%s\n' '  homepage "https://github.com/thepixelabs/uplnk"'
            printf "  version \"%s\"\n" "${VERSION}"
            printf '%s\n' '  license :cannot_represent'
            printf '\n'
            printf '%s\n' '  on_macos do'
            printf '%s\n' '    on_arm do'
            printf "      url \"%s\"\n"    "${URL_DA_ARM64}"
            printf "      sha256 \"%s\"\n" "${SHA_DA_ARM64}"
            printf '\n'
            printf '%s\n' '      def install'
            printf '%s\n' '        bin.install "uplnk-darwin-arm64" => "uplnk"'
            printf '%s\n' '      end'
            printf '%s\n' '    end'
            printf '%s\n' '    on_intel do'
            printf "      url \"%s\"\n"    "${URL_DA_X64}"
            printf "      sha256 \"%s\"\n" "${SHA_DA_X64}"
            printf '\n'
            printf '%s\n' '      def install'
            printf '%s\n' '        bin.install "uplnk-darwin-x64" => "uplnk"'
            printf '%s\n' '      end'
            printf '%s\n' '    end'
            printf '%s\n' '  end'
            printf '\n'
            printf '%s\n' '  on_linux do'
            printf '%s\n' '    on_arm do'
            printf "      url \"%s\"\n"    "${URL_LX_ARM64}"
            printf "      sha256 \"%s\"\n" "${SHA_LX_ARM64}"
            printf '\n'
            printf '%s\n' '      def install'
            printf '%s\n' '        bin.install "uplnk-linux-arm64" => "uplnk"'
            printf '%s\n' '      end'
            printf '%s\n' '    end'
            printf '%s\n' '    on_intel do'
            printf "      url \"%s\"\n"    "${URL_LX_X64}"
            printf "      sha256 \"%s\"\n" "${SHA_LX_X64}"
            printf '\n'
            printf '%s\n' '      def install'
            printf '%s\n' '        bin.install "uplnk-linux-x64" => "uplnk"'
            printf '%s\n' '      end'
            printf '%s\n' '    end'
            printf '%s\n' '  end'
            printf '\n'
            printf '%s\n' '  test do'
            printf '%s\n' '    assert_match version.to_s, shell_output("#{bin}/uplnk --version")'
            printf '%s\n' '  end'
            printf '%s\n' 'end'
          } > Formula/uplnk.rb

      - name: Open PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "uplnk: bump to ${{ steps.vars.outputs.version }}"
          branch: "bump/uplnk-${{ steps.vars.outputs.version }}"
          title: "uplnk: bump to ${{ steps.vars.outputs.version }}"
          body: |
            Automated version bump triggered by release `${{ steps.vars.outputs.tag }}`.

            Pre-built binaries (no Node.js runtime required):

            | Platform      | Architecture | URL |
            |---------------|--------------|-----|
            | macOS         | arm64        | `${{ steps.sha.outputs.url_darwin_arm64 }}` |
            | macOS         | x86-64       | `${{ steps.sha.outputs.url_darwin_x64 }}` |
            | Linux         | x86-64       | `${{ steps.sha.outputs.url_linux_x64 }}` |
            | Linux         | arm64        | `${{ steps.sha.outputs.url_linux_arm64 }}` |

            **SHA-256 checksums:**
            - `darwin-arm64`: `${{ steps.sha.outputs.sha_darwin_arm64 }}`
            - `darwin-x64`:   `${{ steps.sha.outputs.sha_darwin_x64 }}`
            - `linux-x64`:    `${{ steps.sha.outputs.sha_linux_x64 }}`
            - `linux-arm64`:  `${{ steps.sha.outputs.sha_linux_arm64 }}`

            Alternative install method (no Homebrew required):
            ```sh
            curl -fsSL https://raw.githubusercontent.com/thepixelabs/uplnk/main/scripts/install.sh | sh
            ```

            This PR was opened by the uplnk-homebrew-bump GitHub App.
            It will auto-merge once `brew audit --strict --online` passes.
          labels: version-bump
