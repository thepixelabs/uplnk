name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Check Node version consistency
        run: |
          NODE_VER=$(cat .node-version | tr -d '[:space:]')
          NVMRC=$(cat .nvmrc | tr -d '[:space:]')
          VOLTA=$(node -e "console.log(require('./package.json').volta?.node ?? '')" 2>/dev/null || echo "")
          echo ".node-version: $NODE_VER  .nvmrc: $NVMRC  volta: $VOLTA"
          MAJOR_NV=$(echo "$NODE_VER" | cut -d. -f1)
          MAJOR_NVM=$(echo "$NVMRC" | cut -d. -f1)
          if [ "$MAJOR_NV" != "$MAJOR_NVM" ]; then
            echo "ERROR: .node-version ($NODE_VER) and .nvmrc ($NVMRC) disagree on major version"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ matrix.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ matrix.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages)
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
