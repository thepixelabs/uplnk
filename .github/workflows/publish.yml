name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance attestation

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter pylon-dev build

      - name: Verify shebang in bin output
        run: |
          head -1 packages/app/bin/pylon.js | grep -q '#!/usr/bin/env node' \
            || (echo "ERROR: shebang missing from bin/pylon.js" && exit 1)

      - name: Verify --version works
        run: node packages/app/bin/pylon.js --version

      - name: Publish (stable)
        if: "!contains(github.event.release.tag_name, '-')"
        run: pnpm --filter pylon-dev publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish (pre-release)
        if: "contains(github.event.release.tag_name, '-')"
        run: |
          TAG=$(echo "${{ github.event.release.tag_name }}" | sed 's/.*-\([a-z]*\).*/\1/')
          pnpm --filter pylon-dev publish --no-git-checks --tag "${TAG}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
