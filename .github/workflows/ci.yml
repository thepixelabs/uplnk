name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 9.15.0

      # Node is still installed for the migration-journal integrity check below
      # (the inline `node -e` script) and for pnpm bootstrap. Application
      # runtime + tests run under Bun.
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.1.x

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ matrix.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ matrix.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages)
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      # ── Migration journal integrity ─────────────────────────────────────────
      # Every .sql file in packages/db/migrations/ (excluding meta/) MUST have
      # a corresponding entry in _journal.json. Drizzle silently skips any file
      # that is absent from the journal, which can hide schema drift until it
      # causes a runtime crash (see: missing `source` column incident, 0005/0006).
      - name: Check migration journal integrity
        shell: bash
        run: |
          MIGRATIONS_DIR="packages/db/migrations"
          JOURNAL="${MIGRATIONS_DIR}/meta/_journal.json"

          if [ ! -f "$JOURNAL" ]; then
            echo "ERROR: journal not found at $JOURNAL"
            exit 1
          fi

          # Extract all registered tags from the journal (one per line).
          registered=$(node -e "
            const j = JSON.parse(require('fs').readFileSync('$JOURNAL', 'utf8'));
            j.entries.forEach(e => console.log(e.tag));
          ")

          missing=()
          for sql_file in "$MIGRATIONS_DIR"/*.sql; do
            # Derive the tag from the filename (strip directory and .sql suffix).
            tag=$(basename "$sql_file" .sql)
            if ! echo "$registered" | grep -qxF "$tag"; then
              missing+=("$tag")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: The following migration files are NOT registered in _journal.json:"
            for m in "${missing[@]}"; do
              echo "  - ${m}.sql"
            done
            echo ""
            echo "Run 'drizzle-kit generate' or manually add the entries to:"
            echo "  $JOURNAL"
            exit 1
          fi

          echo "OK: all $(echo "$registered" | wc -l | tr -d ' ') migration(s) are registered in the journal."

      # ── Startup smoke test ──────────────────────────────────────────────────
      # Verifies that the entry-point module loads, all static imports resolve,
      # and argument parsing works — without launching the TUI or touching the
      # database. The --version flag exits before runMigrations() so this test
      # stays fast and hermetic. The migration journal check above is the gate
      # for DB schema correctness; this gate is for module-graph correctness.
      - name: Startup smoke test (--version exits 0)
        run: bun packages/app/bin/uplnk.ts --version

      # ── Compiled binary smoke test ──────────────────────────────────────────
      # Catches regressions in the bun build --compile path on every PR rather
      # than waiting for a release. Exercises module resolution against the
      # $bunfs virtual filesystem (where react-devtools-core / @aws-sdk-client-s3
      # stub overrides need to actually land) and confirms --version exits 0.
      # Linux-x64 only — that is the host arch on the runner. The other targets
      # share the same bundle pipeline; if linux-x64 is healthy they are too.
      - name: Compile + smoke binary (linux-x64)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist
          pnpm bundle-migrations
          bun build packages/app/bin/uplnk.ts \
            --compile \
            --target=bun-linux-x64 \
            --outfile=dist/uplnk-ci-smoke
          chmod +x dist/uplnk-ci-smoke
          ./dist/uplnk-ci-smoke --version
