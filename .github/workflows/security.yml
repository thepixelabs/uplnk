name: Security

on:
  pull_request:
    branches:
      - main
  schedule:
    # Every Monday at 08:00 UTC.
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        # --audit-level=high: fail only on high/critical; moderate advisories are
        # captured but should not block PRs.  Tighten to "moderate" once the
        # advisory backlog is cleared.
        run: pnpm audit --audit-level=high

