name: Security

on:
  pull_request:
    branches:
      - main
  schedule:
    # Every Monday at 08:00 UTC.
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        # --audit-level=high: fail only on high/critical; moderate advisories are
        # captured but should not block PRs.  Tighten to "moderate" once the
        # advisory backlog is cleared.
        #
        # NOTE: continue-on-error is set because the npm registry retired the
        # /v1/security/audits endpoint used by pnpm 9.x (HTTP 410). The step
        # still runs and its output is visible in the job logs. Remove this once
        # pnpm is upgraded to 10.x, which uses the new bulk advisory endpoint.
        continue-on-error: true
        run: pnpm audit --audit-level=high

